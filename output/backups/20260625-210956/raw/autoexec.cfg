// ==================================================
// CONFIGURACIÓN AVANZADA Y COMPLETA - CS2 AUTOEXEC
// Prioridad: Binds de Usuario + Máximo Rendimiento Competitivo
// ==================================================

unbindall // Evita solapamientos limpiando binds previos

// ==================================================
// BLOQUE 0 - INICIALIZACIÓN Y CONSOLA
// ==================================================
con_enable "true" // Fuerza la activación de la consola de desarrollador
bind "`" "toggleconsole" // Tecla de apertura de consola (por defecto)
bind "ESCAPE" "cancelselect" // Menú principal / Cancelar selección

// ==================================================
// BLOQUE 1 - MOVIMIENTO E INPUT (RESPECT USER SETTINGS)
// ==================================================
bind "w" "+forward" // Avanzar
bind "a" "+left" // Moverse a la izquierda
bind "s" "+back" // Retroceder
bind "d" "+right" // Moverse a la derecha
bind "SHIFT" "+sprint" // Caminar (Silencioso)
bind "SPACE" "+duck" // Agacharse (Mantenido según tu config)
bind "ALT" "+jump" // Saltar (Mantenido según tu config)

// Sensibilidad y comportamiento del mouse
sensitivity "2.5" // Sensibilidad base
sensitivity_y_scale "1.000000" // Multiplicador vertical simétrico
zoom_sensitivity_ratio "1.000000" // Sensibilidad 1:1 al usar mira telescópica
m_pitch "0.022000" // Ángulo pitch estándar
m_yaw "0.022000" // Ángulo yaw estándar
bind "MOUSE_X" "yaw" // Mapeo analógico horizontal
bind "MOUSE_Y" "pitch" // Mapeo analógico vertical
input_button_code_is_scan_code_scd "true" // Registro estricto por hardware (evita lag por distribución de teclado)

// ==================================================
// BLOQUE 2 - ARMAS, UTILIDAD Y ACCIONES
// ==================================================
bind "MOUSE1" "+attack" // Disparo principal
bind "MOUSE2" "+attack2" // Disparo secundario / Zoom
bind "r" "+reload" // Recargar
bind "x" "drop" // Soltar arma activa
bind "e" "+use" // Interactuar / Desactivar C4
bind "f" "+lookatweapon" // Inspeccionar arma / Animación
bind "c" "switchhands" // Alternar mano izquierda/derecha (Mecánica nativa CS2)

// Selección de slots de armamento
bind "MWHEELDOWN" "slot1" // Arma principal
bind "MOUSE4" "slot2" // Arma secundaria
bind "MWHEELUP" "slot3" // Cuchillo / Cuerpo a cuerpo
bind "q" "slot4" // Ciclo general de granadas
bind "z" "slot5" // Utilidad especial (C4 o items de modo de juego)

// Asignación directa de granadas competitivas (Filtro por Slot rápido)
bind "1" "slot6" // Granada de fragmentación (HE)
bind "2" "slot7" // Granada cegadora (Flashbang)
bind "3" "slot8" // Granada de humo (Smoke)
bind "5" "slot9" // Granada señuelo (Decoy)
bind "4" "slot10" // Cóctel Molotov / Granada incendiaria

// Comportamiento del sistema de armas
cl_silencer_mode "1" // Bloquea el desmontaje accidental del silenciador en USP/M4A1-S
cl_sniper_auto_rezoom "false" // No vuelve a meter zoom automáticamente tras disparar con sniper
cl_debounce_zoom "true" // Previene inputs fantasmas de doble zoom al clickear rápido

// ==================================================
// BLOQUE 3 - MENÚ DE COMPRA Y ECONOMÍA
// ==================================================
bind "b" "buymenu" // Abrir interfaz de compra
cl_use_opens_buy_menu "false" // Presionar "E" en base no abre el menú de compra (evita muertes absurdas)
cl_buywheel_donate_key "0" // Tecla de donación directa en la rueda (0 = Ctrl izquierdo por defecto)
cl_buywheel_nonumberpurchasing "false" // Permite usar los números del teclado para comprar rápido

// Umbrales de advertencia económica en interfaz de compra (Límites de Loss/Reward)
cl_buymenu_t_nextround_low "1400"
cl_buymenu_t_nextround_high "5000"
cl_buymenu_ct_nextround_low "1400"
cl_buymenu_ct_nextround_high "5000"

// ==================================================
// BLOQUE 4 - AJUSTES DE RED Y SUB-TICK AVANZADO
// ==================================================
rate "786432" // Ancho de banda máximo permitido (Ideal para conexiones modernas/fibra)
cl_net_buffer_ticks "0" // Interpolación de sub-tick (0 = Latencia mínima/Mapeo crudo. Subir a 1 o 2 solo si sufres pérdida de paquetes constante)

// *Nota de optimización*: Los comandos antiguos 'cl_updaterate', 'cl_cmdrate' e 'interp_ratio' 
// han sido completamente removidos por Valve en el motor Source 2. Todo se gestiona por el net buffer.

// ==================================================
// BLOQUE 5 - RENDIMIENTO, GRÁFICOS Y LATENCIA
// ==================================================
fps_max "300" // Cap de frames óptimo para estabilidad de frametimes
fps_max_ui "60" // Limita los frames en los menús para reducir carga térmica innecesaria
r_fullscreen_gamma "2.5" // Nivel de gamma/brillo óptimo para visibilidad en zonas oscuras

// Reducción de Latencia de Renderizado
r_low_latency "2" // NVIDIA Reflex Activado + Boost (Fuerza frecuencias altas en la GPU)
engine_low_latency_sleep_after_client_tick "true" // Sincroniza los frames justo tras el sub-tick del cliente reduciendo el retraso de entrada

// ==================================================
// BLOQUE 6 - NUEVA TELEMETRÍA DE CS2 (NOMBRES CORRECTOS)
// ==================================================
cl_hud_telemetry_serverrecvmargin_graph_show "0" // Oculta el gráfico masivo de red

// Formato nativo: 0 = Ocultar | 1 = Alerta (Si va mal) | 2 = Siempre visible
cl_hud_telemetry_frametime_show "2"       // Muestra los FPS / Frametime (¡Este es el nombre real!)
cl_hud_telemetry_ping_show "2"            // Muestra el Ping siempre
cl_hud_telemetry_net_misdelivery_show "2" // Muestra la pérdida de paquetes siempre

// ==================================================
// BLOQUE 7 - INTERFAZ DE USUARIO (HUD) Y COMUNICACIONES
// ==================================================
bind "TAB" "+showscores" // Tabla de puntuaciones
bind "y" "messagemode" // Chat global público
bind "u" "messagemode2" // Chat interno de equipo
bind "CTRL" "voice_toggle_open_mic" // Alternador de micrófono abierto (Mantenido según tu config)
bind "CAPSLOCK" "+radialradio" // Rueda de comandos de radio rápidos
bind "MOUSE3" "player_ping" // Ping posicional en mapa para marcar enemigos/utilidad

hud_showtargetid "true" // Muestra el nombre del enemigo en color rojo al apuntarle
cl_showloadout "false" // Oculta el panel fijo de equipamiento lateral (Limpieza visual)
cl_inventory_radial_immediate_select "true" // Selección inmediata al pasar el mouse por menús radiales
cl_inventory_radial_tap_to_cycle "true" // Cambio rápido por toques en menús de inventario

// Ajustes competitivos de interfaz de equipo
cl_teamid_overhead_mode "2" // Muestra siempre flecha, nombre y equipamiento de tus aliados a través de paredes
cl_teammate_colors_show "1" // Colores únicos para cada compañero en el radar/chat (Facilita el Shot-calling)
cl_show_observer_crosshair "2" // Permite ver las miras personalizadas de los jugadores a los que especteas

// ==================================================
// BLOQUE 8 - CONFIGURACIÓN DEL RADAR
// ==================================================
bind "v" "toggleradarscale" // Cambia dinámicamente el zoom del radar con un botón para situaciones de Clutch
cl_hud_radar_scale "1.15" // Aumenta ligeramente el tamaño del radar en el HUD
cl_radar_always_centered "false" // Centrado libre (El mapa no se enfoca en ti, permitiendo ver todo el mapa de juego)
cl_radar_scale "0.40" // Zoom del radar alejado para tener una lectura global de los puntos de mapa
cl_radar_rotate "true" // El radar gira en sintonía con la dirección de tu cámara
cl_radar_icon_scale_min "0.6" // Tamaño adecuado de los puntos de jugadores en el minimapa

// ==================================================
// BLOQUE 9 - AUDIO INTEGRAL Y ESPACIALIZACIÓN (CORREGIDO)
// ==================================================
volume "0.25" 
voice_vox "0" 
snd_mixahead "0.025" 
snd_mute_losefocus "1" 

snd_headphone_eq "1"      // Perfil de audio: Crisp/Nítido
snd_spatialize_lerp "0.0" // Máxima separación L/R estéreo pura

// CORRECCIÓN: Filtrado numérico estricto para Source 2
snd_steamaudio_enable_reverb "0" // Desactiva eco simulado (Claridad de pasos)

// Bloqueo de música secundaria
snd_musicvolume "0" 
snd_mvp_volume "0" 
snd_roundstart_volume "0" 
snd_roundend_volume "0" 
snd_mapobjective_volume "0" 
snd_deathcamera_volume "0" 
snd_tensecondwarning_volume "0.08"

// ==================================================
// BLOQUE 10 - DINÁMICA DE MIRAS DE GRANADAS (CROSSHAIR LINES)
// ==================================================
cl_grenadecrosshair_keepusercrosshair "true" // Mantiene tu mira central activa al equipar utilidad
cl_grenadecrosshair_flash "true" // Despliega líneas extendidas en pantalla al equipar Flashbangs
cl_grenadecrosshair_smoke "true" // Líneas extendidas en Smokes (Crucial para lineups perfectas)
cl_grenadecrosshair_explosive "true" // Líneas extendidas en HE grenades
cl_grenadecrosshair_fire "true" // Líneas extendidas en Molotovs
cl_grenadecrosshair_decoy "false" // Sin líneas extendidas para Decoys

// Delays de activación de líneas (0 = Respuesta instantánea al sacar la granada)
cl_grenadecrosshairdelay_flash "0.000000"
cl_grenadecrosshairdelay_smoke "0.000000"
cl_grenadecrosshairdelay_explosive "0.000000"
cl_grenadecrosshairdelay_fire "0.000000"
cl_grenadecrosshairdelay_decoy "0.000000"

// ==================================================
// BLOQUE 11 - PERSONALIZACIÓN ESTÉTICA (CROSSHAIR & VIEWMODEL)
// ==================================================
// Tu mira estática personalizada actual
cl_crosshairstyle "4"
cl_crosshairsize "1.5"
cl_crosshairthickness "0.0"
cl_crosshairgap "-3.0"
cl_crosshairdot "false"
cl_crosshairalpha "255"
cl_crosshairusealpha "true"
cl_crosshair_drawoutline "false"
cl_crosshair_outlinethickness "1.000000"
cl_crosshair_recoil "false"
cl_crosshair_sniper_width "0"
cl_crosshaircolor "5"
cl_crosshaircolor_r "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_b "255"
cl_crosshair_t "false"
cl_crosshairgap_useweaponvalue "false"
cl_fixedcrosshairgap "-9.000000"

// Parámetros de mira dinámica (Variables secundarias preservadas)
cl_crosshair_dynamic_maxdist_splitratio "0.300000"
cl_crosshair_dynamic_splitalpha_innermod "1.000000"
cl_crosshair_dynamic_splitalpha_outermod "0.500000"
cl_crosshair_dynamic_splitdist "7"

// Viewmodel (Posición del arma y campo visual optimizado en los ejes)
viewmodel_fov "68.000000" // FOV máximo permitido del arma en pantalla
viewmodel_offset_x "2.500000" // Desplazamiento a la derecha máximo (Despeja el centro de visión)
viewmodel_offset_y "0.000000" // Extensión del brazo neutra
viewmodel_offset_z "-1.500000" // Altura mínima del arma para liberar el campo visual central
cl_prefer_lefthanded "false" // Mano derecha nativa por defecto

// Ajustes complementarios del sistema óptico e Ironsight en CS2
cl_ironsight_dot_scale "1.000000"
cl_ironsight_usecrosshaircolor "false"

// ==================================================
// FINALIZACIÓN - CONFIRMACIÓN DE EJECUCIÓN
// ==================================================
host_writeconfig // Escribe todos los cambios directamente en tu archivo local config.cfg de CS2
echo ""
echo "=========================================================="
echo ">>> NUEVA CONFIGURACIÓN INTEGRAL DE CS2 COMPILADA EXITOSAMENTE <<<"
echo ">>> TODOS LOS COMANDOS ACTIVOS Y BINDS PRESERVADOS <<<"
echo "=========================================================="
echo ""